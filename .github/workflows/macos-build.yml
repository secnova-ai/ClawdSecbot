name: macOS Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'go_lib/**'
      - 'lib/**'
      - 'test/**'
      - 'macos/**'
      - 'images/**'
      - 'pubspec.yaml'
      - 'analysis_options.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'go_lib/**'
      - 'lib/**'
      - 'test/**'
      - 'macos/**'
      - 'images/**'
      - 'pubspec.yaml'
      - 'analysis_options.yaml'

jobs:
  test-flutter:
    name: Flutter Test & Analyze (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter unit tests
        run: flutter test --coverage

  build-go:
    name: Go Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go_lib/go.mod

      - name: Build Go dylib
        working-directory: go_lib
        run: |
          CGO_ENABLED=1 go build -buildvcs=false -o botsec.dylib -buildmode=c-shared .
          if [ -f "libbotsec.dylib" ] && [ ! -f "botsec.dylib" ]; then
            mv libbotsec.dylib botsec.dylib
          fi

      - name: Run Go tests
        working-directory: go_lib
        run: |
          go test -race -v -count=1 -timeout 300s ./...

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: botsec-dylib
          path: go_lib/botsec.dylib
          retention-days: 7

  build-flutter:
    name: Flutter Build (macOS)
    runs-on: macos-latest
    needs: [build-go, test-flutter]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download Go dylib artifact
        uses: actions/download-artifact@v4
        with:
          name: botsec-dylib
          path: plugins

      - name: Disable code signing for CI
        run: |
          echo "CODE_SIGN_IDENTITY=" >> macos/Runner/Configs/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> macos/Runner/Configs/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED=NO" >> macos/Runner/Configs/Release.xcconfig

      - name: Get dependencies
        run: flutter pub get

      - name: Disable Flutter Swift Package Manager integration
        run: flutter config --no-enable-swift-package-manager

      - name: Build macOS app
        run: flutter build macos --release --no-tree-shake-icons
